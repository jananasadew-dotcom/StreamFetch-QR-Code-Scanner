<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>StreamFetch QR Code Scanner</title>
    <link rel="stylesheet" href="style.css">
    <!-- Load the html5-qrcode library -->
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
    <div class="card">
        <h1>StreamFetch QR Code Scanner</h1>
        
        <!-- Viewfinder/Result Area -->
        <div id="reader-container">
            <div id="reader"></div>
            <textarea id="result" readonly placeholder="Scanned QR code content will appear here..."></textarea>
        </div>
        
        <!-- Action Buttons -->
        <div class="action-buttons">
            <button id="start-camera">
                <img src="https://img.icons8.com/material-outlined/24/ffffff/camera--v1.png" alt="camera"/>
                Start Camera Scan
            </button>
            
            <!-- Hide default file input and style this label instead -->
            <label for="file" class="custom-file-upload">
                <img src="https://img.icons8.com/material-outlined/24/ffffff/image.png" alt="file"/>
                Scan from Image File
            </label>
            <input type="file" id="file" accept="image/*">
            
            <button id="copy">
                <img src="https://img.icons8.com/material-outlined/24/ffffff/copy.png" alt="copy"/>
                Copy Result Text
            </button>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
